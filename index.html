<!DOCTYPE html>

<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday Shirlie</title>

<style>

body{

 margin:0;

 height:100vh;

 display:flex;

 justify-content:center;

 align-items:center;

 background:#f5eee1;

 font-family:Georgia, serif;

}

.card{

 width:85%;

 max-width:420px;

 min-height:620px;

 background:#fbf5e9;

 border:3px solid #c9a96e;

 border-radius:18px;

 box-shadow:0 8px 30px rgba(0,0,0,.18);

 display:flex;

 flex-direction:column;

 justify-content:space-between;

 padding:35px 20px;

 text-align:center;

}

.top{

 font-size:42px;

 font-style:italic;

 color:#5b4636;

}

.name{

 font-size:54px;

 margin-top:10px;

 color:#3d2d22;

}

.bird{

 font-size:120px;

 margin:20px 0;

}

.bottom{

 font-size:18px;

 color:#6c5b4b;

}

</style>

</head>

<body>

<div class="card">

  <div>

    <div class="top">Happy Birthday</div>

    <div class="name">Shirlie</div>

  </div>

  <div class="bird">🐦</div>

  <div class="bottom">

    Tap anywhere to open your card<br>

    and begin music

  </div>

</div>

</body>

</html>
